<div style="margin-top:40px;">

  <h2>
    Device Moderation
  </h2>

  <div id="deviceContainer"></div>

</div>

<script>

// ============================================
// DEVICE PANEL
// ============================================

async function renderDevices(){

  const res =
    await fetch(`${API}/api/devices`);

  const devices =
    await res.json();

  const container =
    document.getElementById(
      'deviceContainer'
    );

  if(!devices.length){

    container.innerHTML =
      '<p>No devices yet.</p>';

    return;

  }

  container.innerHTML = `

    <table>

      <thead>

        <tr>

          <th>User</th>
          <th>Device</th>
          <th>Scans</th>
          <th>Max</th>
          <th>Blocked</th>
          <th>Cooldown</th>
          <th>Actions</th>

        </tr>

      </thead>

      <tbody>

        ${devices.map(d => `

          <tr>

            <td>${d.userid}</td>

            <td>${d.deviceid}</td>

            <td>${d.scan_count}</td>

            <td>${d.max_scans}</td>

            <td>
              ${d.is_blocked ? 'YES' : 'NO'}
            </td>

            <td>
              ${d.cooldown_until || '-'}
            </td>

            <td>

              <button
                onclick="blockDevice('${d.deviceid}')"
              >
                Block
              </button>

              <button
                onclick="unblockDevice('${d.deviceid}')"
              >
                Unblock
              </button>

              <button
                onclick="bonusScan('${d.deviceid}')"
              >
                Bonus
              </button>

              <button
                onclick="resetCooldown('${d.deviceid}')"
              >
                Reset
              </button>

            </td>

          </tr>

        `).join('')}

      </tbody>

    </table>

  `;

}

// ============================================
// ACTIONS
// ============================================

async function blockDevice(deviceId){

  await fetch(
    `${API}/api/block-device`,
    {
      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify({
        deviceId
      })
    }
  );

  renderDevices();

}

async function unblockDevice(deviceId){

  await fetch(
    `${API}/api/unblock-device`,
    {
      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify({
        deviceId
      })
    }
  );

  renderDevices();

}

async function resetCooldown(deviceId){

  await fetch(
    `${API}/api/reset-cooldown`,
    {
      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify({
        deviceId
      })
    }
  );

  renderDevices();

}

async function bonusScan(deviceId){

  const scans =
    prompt('Set max scans');

  if(!scans) return;

  await fetch(
    `${API}/api/set-max-scans`,
    {
      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify({

        deviceId,

        maxScans:Number(scans)

      })
    }
  );

  renderDevices();

}

</script>
